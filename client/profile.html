<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Hồ sơ - FitShoes</title>
    <link rel="icon" type="image/png" href="assets/images/nike-logo.png">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media-queries.css">
</head>
<body>
    <div class="wrapper">
        <header id="home">
            <nav class="d-flex padding-inline justify-between align-center">
                <div class="logo-box d-flex align-center">
                    <img src="assets/images/nike-logo-2.png" alt="nike-logo">
                    <h2>FitShoes</h2>
                </div>
                <div class="nav-links">
                    <ul class="d-flex align-center">
                        <li><a href="index2.html">Trang chủ</a></li>
                        <li><a href="shop.html">Cửa hàng</a></li>
                        <li><a href="cart.html">Giỏ hàng</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main class="padding-inline max-width-center">
            <section class="profile-container">
                <!-- Profile Header -->
                <div class="profile-header">
                    <div class="profile-header-content">
                        <div class="profile-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="profile-title">
                            <h1>Hồ sơ của tôi</h1>
                            <p class="profile-subtitle">Quản lý thông tin cá nhân của bạn</p>
                        </div>
                    </div>
                    <button id="edit-toggle-btn" class="btn-edit">
                        <i class="fas fa-edit"></i> Chỉnh sửa
                    </button>
                </div>

                <!-- Profile View -->
                <div id="profile-view" class="profile-view">
                    <div class="profile-info-grid">
                        <div class="info-card">
                            <div class="info-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="info-content">
                                <label>Tên</label>
                                <p id="profile-name">-</p>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="info-content">
                                <label>Email</label>
                                <p id="profile-email">-</p>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-icon">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div class="info-content">
                                <label>Số điện thoại</label>
                                <p id="profile-phone">-</p>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-icon">
                                <i class="fas fa-venus-mars"></i>
                            </div>
                            <div class="info-content">
                                <label>Giới tính</label>
                                <p id="profile-gender">-</p>
                            </div>
                        </div>

                        <div class="info-card info-card-full">
                            <div class="info-icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="info-content">
                                <label>Địa chỉ</label>
                                <p id="profile-address">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Profile Edit Form -->
                <div id="profile-edit" class="profile-edit" style="display:none;">
                    <form id="profile-form" novalidate class="edit-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-name">
                                    <i class="fas fa-user"></i> Tên (chỉ đọc)
                                </label>
                                <input id="edit-name" type="text" disabled class="form-input disabled-input">
                            </div>
                            <div class="form-group">
                                <label for="edit-email">
                                    <i class="fas fa-envelope"></i> Email (chỉ đọc)
                                </label>
                                <input id="edit-email" type="email" disabled class="form-input disabled-input">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-phone">
                                    <i class="fas fa-phone"></i> Số điện thoại
                                </label>
                                <input id="edit-phone" type="tel" placeholder="0901234567" class="form-input">
                            </div>
                            <div class="form-group">
                                <label for="edit-gender">
                                    <i class="fas fa-venus-mars"></i> Giới tính
                                </label>
                                <select id="edit-gender" class="form-input">
                                    <option value="">-- Chưa chọn --</option>
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="edit-address">
                                <i class="fas fa-map-marker-alt"></i> Địa chỉ
                            </label>
                            <textarea id="edit-address" placeholder="Nhập địa chỉ của bạn..." class="form-input textarea-input"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-save">
                                <i class="fas fa-check"></i> Lưu thay đổi
                            </button>
                            <button type="button" id="cancel-edit-btn" class="btn-cancel">
                                <i class="fas fa-times"></i> Hủy
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Message -->
                <div id="profile-message" class="profile-message"></div>

                <!-- Logout Button -->
                <div class="profile-footer">
                    <button id="logout-btn" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </button>
                </div>
            </section>
        </main>

    </div>

    <script src="js/profile.js"></script>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script src="https://kit.fontawesome.com/8769ee6e50.js" crossorigin="anonymous"></script>
</body>
</html>
