<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Đăng nhập - FitShoes</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Left Side - Branding -->
            <div class="auth-brand">
                <div class="brand-logo">
                    <i class="fas fa-shoe-prints"></i>
                </div>
                <h1>FitShoes</h1>
                <p>Giày tốt, cuộc sống tốt</p>
                <div class="brand-features">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Sản phẩm chất lượng cao</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Giao hàng nhanh chóng</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Hỗ trợ khách hàng 24/7</span>
                    </div>
                </div>
            </div>

            <!-- Right Side - Form -->
            <div class="auth-form-container">
                <div class="auth-form">
                    <h2>Đăng nhập tài khoản</h2>
                    <p class="auth-form-subtitle">Chào mừng quay lại, bạn yêu!</p>

                    <form id="login-form" novalidate>
                        <div class="form-group">
                            <label for="email">
                                <i class="fas fa-envelope"></i> Email
                            </label>
                            <input id="email" name="email" type="email" placeholder="you@example.com" required class="auth-input">
                            <div class="error-message" id="err-email"></div>
                        </div>

                        <div class="form-group">
                            <label for="password">
                                <i class="fas fa-lock"></i> Mật khẩu
                            </label>
                            <div class="password-wrapper">
                                <input id="password" name="password" type="password" placeholder="••••••••" required class="auth-input">
                                <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="error-message" id="err-password"></div>
                        </div>

                        <button type="submit" class="btn-auth-submit">
                            <span>Đăng nhập</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="auth-divider">hoặc</div>

                    <div id="google-section" class="google-signin-wrapper">
                        <div id="google-signin"></div>
                        <div class="google-note" id="google-note">Đăng nhập bằng Google</div>
                    </div>

                    <div class="auth-footer">
                        <p>Bạn chưa có tài khoản? <a href="register.html" class="auth-link">Đăng ký ngay</a></p>
                        <a href="index.html" class="auth-back-link">
                            <i class="fas fa-arrow-left"></i> Trở về trang chủ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>window.GOOGLE_CLIENT_ID = '207739755718-pn3i7egttj3b54bpqqsr6tndnpr0m1lv.apps.googleusercontent.com';</script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const button = event.target.closest('.toggle-password');
            if (field.type === 'password') {
                field.type = 'text';
                button.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                field.type = 'password';
                button.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }
    </script>
    <script src="js/login.js"></script>
    <script src="https://kit.fontawesome.com/8769ee6e50.js" crossorigin="anonymous"></script>
</body>
</html>
