<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Chi tiết dịch vụ - FitShoes</title>
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media-queries.css">
    <style>
        /* Small adjustments for service detail layout */
        .service-detail { padding: 4rem 0; }
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: start; }
        .service-image img { width:100%; height:auto; object-fit:contain; }
        .service-meta h2 { font-size: 3rem; margin-bottom: 1rem; }
        .service-benefits li { margin-bottom: .6rem; }
        @media (max-width: 800px){ .service-grid{ grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <nav class="d-flex padding-inline justify-between align-center">
                <div class="logo-box d-flex align-center">
                    <img src="assets/images/nike-logo-2.png" alt="nike-logo">
                    <h2>FitShoes</h2>
                </div>
                <div class="nav-links">
                    <ul class="d-flex align-center">
                        <li><a href="index.html">Trang chủ</a></li>
                        <li><a href="index.html#services-section">Dịch vụ</a></li>
                        <li><a href="index.html#shoes-cards-section">Cửa hàng</a></li>
                        <li><a href="login.html">Đăng nhập</a></li>
                    </ul>
                </div>
                <span class="mobile-toggle-btn"><i class="fa fa-bars"></i></span>
            </nav>
        </header>

        <main class="padding-inline service-detail">
            <section class="max-width-center section-shadow">
                <div id="service-root" class="service-grid">
                    <!-- Rendered by js/service.js -->
                </div>
            </section>
        </main>

        <footer class="padding-inline">
            <div class="footer-center max-width-center">
                <div class="footer-links-box">
                    <h3>Cửa hàng</h3>
                    <ul>
                        <li><a href="#">Nam</a></li>
                        <li><a href="#">Nữ</a></li>
                    </ul>
                </div>
                <div class="footer-links-box">
                    <h3>Thông tin</h3>
                    <ul>
                        <li><a href="index.html">Trang chủ</a></li>
                    </ul>
                </div>
                <div class="footer-links-box">
                    <h3>Kết nối</h3>
                    <div class="social-media-icons d-flex">
                        <a href="#"><i class="fa fa-facebook-f"></i></a>
                        <a href="#"><i class="fa fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/script.js"></script>
    <script src="js/service.js"></script>
    <script src="https://kit.fontawesome.com/8769ee6e50.js" crossorigin="anonymous"></script>
</body>
</html>
