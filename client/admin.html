<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Admin - Quản lý sản phẩm</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      font-family: 'Be Vietnam Pro', sans-serif;
      padding: 2rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding: 0 2rem;
    }

    .admin-header h1 {
      font-size: 2.5rem;
      color: var(--main-color);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .admin-header i {
      font-size: 2.5rem;
      color: var(--main-color);
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .admin-form-section {
      padding: 3rem;
      border-bottom: 2px solid #f0f0f0;
    }

    .admin-form-section h2 {
      font-size: 1.8rem;
      color: var(--main-color);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .admin-form-section h2 i {
      font-size: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--main-color);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group label i {
      font-size: 1.4rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 0.8rem;
      font-size: 1.4rem;
      font-family: inherit;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--main-color);
      background: white;
      box-shadow: 0 0 0 3px rgba(21, 51, 86, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    #submitBtn {
      flex: 1;
      padding: 1.3rem 2rem;
      background: linear-gradient(135deg, var(--main-color) 0%, var(--helping-color) 100%);
      color: white;
      border: none;
      border-radius: 0.8rem;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    #submitBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(21, 51, 86, 0.3);
    }

    #submitBtn:active {
      transform: translateY(-1px);
    }

    #formMsg {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 0.8rem;
      font-size: 1.4rem;
      font-weight: 600;
      display: none;
    }

    #formMsg.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #51cf66;
    }

    #formMsg.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #ff6b6b;
    }

    .admin-list-section {
      padding: 3rem;
    }

    .admin-list-section h2 {
      font-size: 1.8rem;
      color: var(--main-color);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .admin-list-section h2 i {
      font-size: 2rem;
    }

    #productList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: linear-gradient(135deg, #f5f7fa 0%, #f9fafc 100%);
      border: 2px solid #e0e0e0;
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(21, 51, 86, 0.15);
      border-color: var(--main-color);
    }

    .product-card h3 {
      font-size: 1.5rem;
      color: var(--main-color);
      margin-bottom: 0.8rem;
      word-break: break-word;
    }

    .product-info {
      font-size: 1.3rem;
      color: #666;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .product-info strong {
      color: var(--main-color);
      min-width: 80px;
    }

    .product-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid #e0e0e0;
    }

    .btn-edit, .btn-delete {
      flex: 1;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 0.6rem;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-edit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn-delete {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      color: white;
    }

    .btn-delete:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: #999;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
        padding: 0;
      }

      .admin-header h1 {
        font-size: 1.8rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .admin-form-section,
      .admin-list-section {
        padding: 1.5rem;
      }

      #productList {
        grid-template-columns: 1fr;
      }

      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <div>
      <h1><i class="fas fa-cogs"></i> Quản lý Admin</h1>
    </div>
  </div>

  <div class="admin-container">
    <!-- Form Section -->
    <div class="admin-form-section">
      <h2><i class="fas fa-plus-circle"></i> Thêm sản phẩm mới</h2>
      <form id="addProductForm" method="POST" action="#" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="name"><i class="fas fa-shoe-prints"></i> Tên sản phẩm</label>
            <input id="name" name="name" type="text" placeholder="Nhập tên sản phẩm" required>
          </div>
          <div class="form-group">
            <label for="price"><i class="fas fa-dollar-sign"></i> Giá</label>
            <input id="price" name="price" type="number" min="0" placeholder="0" required>
          </div>
          <div class="form-group">
            <label for="brand"><i class="fas fa-tag"></i> Thương hiệu</label>
            <input id="brand" name="brand" type="text" placeholder="Nike, Adidas...">
          </div>
          <div class="form-group">
            <label for="gender"><i class="fas fa-venus-mars"></i> Giới tính</label>
            <select id="gender" name="gender">
              <option value="unisex">Unisex</option>
              <option value="male">Nam</option>
              <option value="female">Nữ</option>
            </select>
          </div>
          <div class="form-group" style="grid-column: 1 / -1;">
            <label for="description"><i class="fas fa-align-left"></i> Mô tả</label>
            <textarea id="description" name="description" placeholder="Nhập mô tả chi tiết về sản phẩm..."></textarea>
          </div>
          <div class="form-group" style="grid-column: 1 / -1;">
            <label for="images"><i class="fas fa-image"></i> Link ảnh</label>
            <input id="images" name="images" type="text" placeholder="assets/images/shoes-1.png, https://...">
          </div>
        </div>
        <div class="form-actions">
          <button id="submitBtn" type="submit"><i class="fas fa-check"></i> Thêm sản phẩm</button>
        </div>
        <div id="formMsg"></div>
      </form>
    </div>

    <!-- List Section -->
    <div class="admin-list-section">
      <h2><i class="fas fa-list"></i> Danh sách sản phẩm</h2>
      <div id="productList">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>Chưa có sản phẩm nào</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
