<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Xem Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-section select,
        .filter-section input,
        .filter-section button {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .filter-section select {
            min-width: 200px;
        }

        .filter-section input {
            min-width: 250px;
            flex: 1;
            min-width: 200px;
        }

        .filter-section button {
            background: #0078d4;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            padding: 10px 24px;
        }

        .filter-section button:hover {
            background: #106ebe;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th {
            background: #f0f0f0;
            font-weight: 600;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #ddd;
            position: sticky;
            top: 0;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        table tr:hover {
            background: #f9f9f9;
        }

        .level-ERROR {
            color: #d32f2f;
            font-weight: bold;
        }

        .level-WARN {
            color: #f57c00;
            font-weight: bold;
        }

        .level-INFO {
            color: #0288d1;
        }

        .level-DEBUG {
            color: #7b7b7b;
        }

        .timestamp {
            color: #666;
            font-size: 12px;
        }

        .details-cell {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            max-width: 400px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pagination {
            margin-top: 24px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .pagination button {
            padding: 8px 16px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 14px;
        }

        .pagination button:hover {
            background: #f0f0f0;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            color: #666;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-failed {
            background: #ffcdd2;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Admin - Xem Logs</h1>

        <div class="filter-section">
            <select id="logType">
                <option value="">-- Chọn loại log --</option>
                <option value="http-requests.log">HTTP Requests</option>
                <option value="authentication.log">Authentication</option>
                <option value="audit.log">Audit (Admin Actions)</option>
                <option value="errors.log">Errors</option>
            </select>
            <input type="text" id="searchInput" placeholder="Tìm kiếm...">
            <button onclick="loadLogs()">Tải Logs</button>
        </div>

        <table id="logsTable">
            <thead>
                <tr>
                    <th>Thời gian</th>
                    <th>Level</th>
                    <th>Thông điệp</th>
                    <th>Chi tiết</th>
                </tr>
            </thead>
            <tbody id="logsBody">
                <tr>
                    <td colspan="4" class="empty-state">Chọn loại log để xem</td>
                </tr>
            </tbody>
        </table>

        <div class="pagination">
            <button id="prevBtn" onclick="previousPage()">← Trước</button>
            <span id="pageInfo">Trang 1</span>
            <button id="nextBtn" onclick="nextPage()">Sau →</button>
        </div>
    </div>

    <script src="js/logs.js"></script>
</body>
</html>
