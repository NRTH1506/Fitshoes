<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Thanh toán thành công - FitShoes</title>
    <link rel="icon" type="image/png" href="assets/images/nike-logo.png">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media-queries.css">
    
    <style>
        .success-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 0;
            min-height: 60vh; /* Căn giữa theo chiều dọc */
        }

        .success-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            border-top: 5px solid #28a745; /* Màu xanh lá thành công */
        }

        .success-icon {
            font-size: 5rem;
            color: #28a745;
            margin-bottom: 1.5rem;
            animation: popIn 0.5s ease-out;
        }

        .success-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 1rem;
        }

        .success-desc {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Tận dụng style nút bấm của bạn hoặc định nghĩa lại cho đẹp */
        .btn-success {
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-success:hover { background-color: #218838; transform: translateY(-2px); }

        .btn-outline {
            background-color: transparent;
            color: #555;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #ddd;
            transition: 0.3s;
        }
        .btn-outline:hover { background-color: #f8f9fa; border-color: #999; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header id="home">
            <nav class="d-flex padding-inline justify-between align-center">
                <div class="logo-box d-flex align-center">
                    <img src="assets/images/nike-logo-2.png" alt="nike-logo">
                    <h2>FitShoes</h2>
                </div>
                <div class="nav-links">
                    <ul class="d-flex align-center">
                        <li><a href="index2.html">Trang chủ</a></li>
                        <li><a href="shop.html">Cửa hàng</a></li>
                        <li><a href="cart.html">Giỏ hàng</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main class="padding-inline max-width-center">
            <section class="success-container">
                <div class="success-card">
                    <div class="success-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    
                    <h1 class="success-title">Thanh toán thành công!</h1>
                    
                    <p class="success-desc">
                        Cảm ơn bạn đã mua sắm tại FitShoes.<br>
                        Đơn hàng của bạn đã được ghi nhận và đang được xử lý.
                        Vui lòng kiểm tra email để xem chi tiết.
                    </p>

                    <div class="btn-group">
                        <a href="shop.html" class="btn-outline">
                            <i class="fas fa-shopping-bag"></i> Mua tiếp
                        </a>
                        <a href="index2.html" class="btn-success">
                            <i class="fas fa-home"></i> Về trang chủ
                        </a>
                    </div>
                </div>
            </section>
        </main>

    </div>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script src="https://kit.fontawesome.com/8769ee6e50.js" crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Xóa giỏ hàng trong LocalStorage ngay khi tải trang này
            localStorage.removeItem('fs_cart');
            console.log("Cart cleared successfully.");

            // 2. Cập nhật lại số lượng trên icon giỏ hàng (về 0)
            // Giả sử trong cart.js bạn có hàm window.fsCart.updateCartBadge()
            if(window.fsCart && typeof window.fsCart.updateCartBadge === 'function'){
                window.fsCart.updateCartBadge();
            } else {
                // Fallback nếu cart.js chưa expose hàm
                const badge = document.querySelector('#cart-count'); // Selector tùy theo code của bạn
                if(badge) badge.textContent = '0';
            }
        });
    </script>
</body>
</html>
